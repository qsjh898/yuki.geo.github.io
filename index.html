<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yuki</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      max-width: 480px;
      width: 100%;
      padding: 48px 40px;
      border: 1px solid #222;
      border-radius: 12px;
      background: #111;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .role { color: #888; font-size: 14px; margin-bottom: 24px; }
    .section { margin-bottom: 20px; }
    .section-title {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 13px;
    }
    .links { display: flex; flex-wrap: wrap; gap: 16px; }
    .links a {
      color: #4dabf7;
      text-decoration: none;
      font-size: 14px;
    }
    .links a:hover { color: #74c0fc; }
    .bio { font-size: 14px; line-height: 1.6; color: #aaa; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Yuki</h1>
    <p class="role"></p>

    <div class="section">
      <p class="bio">从问题本质出发，用最直接的路径解决。写代码追求简洁，不做过度工程。</p>
    </div>

    <div class="section">
      <div class="section-title">技能</div>
      <div class="tags">
        <span class="tag">Vue</span>
        <span class="tag">JavaScript</span>
        <span class="tag">TypeScript</span>
        <span class="tag">CSS</span>
        <span class="tag">Node.js</span>
        <span class="tag">Git</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">链接</div>
      <div class="links">
        
      </div>
    </div>
  </div>
</body>
</html>
